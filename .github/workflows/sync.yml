name: Sync Docs from Gitcode

on:
  schedule:
    # Daily at 11:00 PM Beijing time (UTC+8 → 15:00 UTC)
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 30
    env:
      HTTP_PROXY: 'http://127.0.0.1:7890'
      HTTPS_PROXY: 'http://127.0.0.1:7890'
    steps:
      - name: Checkout repo
        run: |
          rm -f .git/shallow.lock .git/index.lock 2>/dev/null
          if [ -d .git ]; then
            # Update remote URL with fresh token for this run
            git remote set-url origin \
              https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git fetch origin main --depth=1
            git reset --hard origin/main
          else
            git clone --depth=1 --branch main \
              https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Sync from gitcode
        run: bash scripts/sync-from-gitcode.sh

      - name: Push changes
        run: |
          # If sync script didn't commit, do it now
          if git status --porcelain | grep -q .; then
            git add docs/ i18n/ sidebars.ts scripts/ 2>/dev/null || true
            git config user.email "ci@designer-docs.local"
            git config user.name "CI Bot"
            git commit -m "sync: update API docs from gitcode [automated]" || true
          fi
          # Try to push, ignore "already up to date"
          PUSH_OUTPUT=$(git push origin main 2>&1) || {
            if echo "$PUSH_OUTPUT" | grep -q "Everything up-to-date\|up to date"; then
              echo "No changes to push."
            else
              echo "$PUSH_OUTPUT"
              exit 1
            fi
          }
          echo "✅ Done."
