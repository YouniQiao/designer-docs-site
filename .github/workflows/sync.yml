name: Sync Docs from Gitcode

on:
  schedule:
    # Daily at 12:00 AM Beijing time (UTC+8 → 16:00 UTC)
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 30
    env:
      HTTP_PROXY: 'http://127.0.0.1:7890'
      HTTPS_PROXY: 'http://127.0.0.1:7890'
    steps:
      - name: Checkout repo
        run: |
          rm -f .git/shallow.lock .git/index.lock 2>/dev/null
          if [ -d .git ]; then
            git fetch origin main --depth=1
            git reset --hard origin/main
          else
            git clone --depth=1 --branch main \
              https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Sync from gitcode
        run: bash scripts/sync-from-gitcode.sh

      - name: Push changes
        run: |
          if git diff --quiet origin/main; then
            echo "No changes to push."
          else
            git push origin main
            echo "✅ Pushed sync changes."
          fi
